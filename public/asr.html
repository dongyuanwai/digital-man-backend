<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASR 录音测试</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 720px;
        margin: 40px auto;
        padding: 0 16px;
        line-height: 1.6;
      }
      button {
        margin-right: 8px;
        margin-bottom: 8px;
        padding: 8px 14px;
      }
      .status {
        margin: 12px 0;
        color: #444;
      }
      pre {
        background: #f6f8fa;
        padding: 12px;
        border-radius: 6px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>ASR 录音上传测试</h1>
    <p>点击开始录音，结束后自动上传到 <code>/speech/asr</code>。</p>

    <button id="startBtn">开始录音</button>
    <button id="stopBtn" disabled>停止并上传</button>
    <div class="status" id="status">状态：未开始</div>
    <h3>识别结果</h3>
    <pre id="result">（暂无）</pre>

    <script>
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const statusEl = document.getElementById("status");
      const resultEl = document.getElementById("result");

      // 媒体录制器实例
      let mediaRecorder = null;
      // 录音数据块数组
      let chunks = [];
      // 录音文件名
      const recordFilename = "record.ogg";

      function setStatus(text) {
        statusEl.textContent = "状态：" + text;
      }

      startBtn.addEventListener("click", async () => {
        try {
          // 获取用户麦克风权限并创建媒体流
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          chunks = [];
          // 优先使用 ogg/opus 格式，如果不支持则使用默认格式
          const preferredMimeType = "audio/ogg;codecs=opus";
          mediaRecorder = MediaRecorder.isTypeSupported(preferredMimeType)
            ? new MediaRecorder(stream, { mimeType: preferredMimeType })
            : new MediaRecorder(stream);

          // 录音数据可用事件：将数据块添加到 chunks 数组
          mediaRecorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) {
              chunks.push(event.data);
            }
          };

          // 录音停止事件：处理录音数据并上传到 /speech/asr
          mediaRecorder.onstop = async () => {
            setStatus("录音结束，正在上传...");
            try {
              // 将数据块合并为 Blob 对象
              const blob = new Blob(chunks, {
                type: mediaRecorder.mimeType || "audio/webm",
              });
              // 检查录音数据是否为空
              if (!blob.size) {
                throw new Error("录音数据为空，请至少录制 1 秒再上传");
              }
              // 创建 FormData 并添加录音文件到表单
              const formData = new FormData();
              formData.append("audio", blob, recordFilename);
              // 发送 POST 请求到 /speech/asr
              const response = await fetch("/speech/asr", {
                method: "POST",
                body: formData,
              });

              if (!response.ok) {
                const text = await response.text();
                throw new Error(text || "请求失败");
              }

              const data = await response.json();
              resultEl.textContent = data.text || "（空结果）";
              setStatus("上传完成");
            } catch (error) {
              setStatus("上传失败");
              resultEl.textContent = "错误：" + (error.message || String(error));
            } finally {
              stream.getTracks().forEach((t) => t.stop());
            }
          };

          // 开始录音（每 250ms 收集一次数据）
          mediaRecorder.start(250);
          setStatus("录音中...");
          startBtn.disabled = true;
          stopBtn.disabled = false;
        } catch (error) {
          setStatus("无法开始录音");
          resultEl.textContent = "错误：" + (error.message || String(error));
        }
      });

      stopBtn.addEventListener("click", () => {
        if (!mediaRecorder) return;
        mediaRecorder.stop();
        startBtn.disabled = false;
        stopBtn.disabled = true;
      });
    </script>
  </body>
</html>
