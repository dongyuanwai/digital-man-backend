<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSE 流式接口测试</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 640px;
      margin: 2rem auto;
      padding: 1rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    button {
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button.primary {
      background: #2563eb;
      color: white;
    }

    button.primary:hover {
      background: #1d4ed8;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .output {
      margin-top: 1.5rem;
      padding: 1rem;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #f9fafb;
      min-height: 120px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .output:empty::before {
      content: "回复将显示在这里...";
      color: #9ca3af;
    }

    .status {
      margin-top: 0.5rem;
      font-size: 0.875rem;
      color: #6b7280;
    }
  </style>
</head>

<body>
  <h1>AI 接口测试</h1>

  <label for="apiUrl">API 地址</label>
  <input
    type="text"
    id="apiUrl"
    placeholder="http://localhost:3000"
  />

  <label for="query">问题</label>
  <input
    type="text"
    id="query"
    placeholder="例如：什么是 LangChain？"
    value="什么是 LangChain？"
  />

  <div style="display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.5rem;">
    <button type="button" id="btnStream" class="primary">流式请求</button>
    <button type="button" id="btnFetch">一次性请求</button>
  </div>
  <p class="status" id="status"></p>
  <div class="output" id="output"></div>

  <script>
    const apiUrlInput = document.getElementById("apiUrl");
    const queryInput = document.getElementById("query");
    const btnStream = document.getElementById("btnStream");
    const btnFetch = document.getElementById("btnFetch");
    const output = document.getElementById("output");
    const status = document.getElementById("status");

    const showError = (msg) => {
      status.textContent = msg;
      status.style.color = "#b91c1c";
    };

    const resetStatus = () => {
      status.style.color = "#6b7280";
    };

    const getBaseUrl = () => apiUrlInput.value.replace(/\/$/, "");

    const getQuery = () => {
      const q = queryInput.value.trim();
      if (!q) {
        showError("请输入问题");
        return null;
      }
      return q;
    };

    const setBusy = (isBusy) => {
      btnStream.disabled = isBusy;
      btnFetch.disabled = isBusy;
    };

    btnStream.addEventListener("click", () => {
      const q = getQuery();
      if (!q) return;

      const url = `${getBaseUrl()}/ai/chat/stream?query=${encodeURIComponent(q)}`;
      output.textContent = "";
      setBusy(true);
      resetStatus();
      status.textContent = "连接中...";

      const eventSource = new EventSource(url);

      eventSource.onmessage = ({ data }) => {
        output.textContent += data;
        status.textContent = "接收中...";
      };

      eventSource.onerror = () => {
        eventSource.close();
        setBusy(false);
        status.textContent = "连接已结束";
      };

      eventSource.addEventListener("done", () => {
        eventSource.close();
        setBusy(false);
        status.textContent = "完成";
      });
    });

    btnFetch.addEventListener("click", async () => {
      const q = getQuery();
      if (!q) return;

      const url = `${getBaseUrl()}/ai/chat?query=${encodeURIComponent(q)}`;
      output.textContent = "";
      setBusy(true);
      resetStatus();
      status.textContent = "请求中...";

      try {
        const res = await fetch(url);
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }
        const json = await res.json();
        output.textContent = json?.response ?? JSON.stringify(json, null, 2);
        status.textContent = "完成";
      } catch (err) {
        showError(`请求失败：${err.message}`);
      } finally {
        setBusy(false);
      }
    });
  </script>
</body>

</html>
